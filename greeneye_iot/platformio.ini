; 업로드 전 src/main.cpp 상단 MODULE_SERIAL 만 g1 / g2 등으로 변경
; MQTT: Cloudflare 터널 → Mosquitto WebSockets(9001) → WSS
; WSS는 esp_crt_bundle_attach(ESP CA 번들)로 서버 검증. 검증 수단 없이 연결하면 esp-tls가 거부함.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.sdkconfig.defaults = sdkconfig.defaults
monitor_speed = 115200
upload_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^6.21.5
