spring:
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 14MB
  datasource:
    url: jdbc:mysql://gwon-db:3306/greeneye?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경사항을 DB에 자동 반영 (핵심!)
    properties:
      hibernate:
        format_sql: true
        show_sql: true

google:
  client:
    id: ${GOOGLE_CLIENT_ID}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    # 구 예: gemini-1.5-flash 는 API에서 제거·404 나는 경우가 많음 → 안정 버전으로 교체 가능
    model: ${GEMINI_MODEL:gemini-2.5-flash}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://gwon-mosquitto:1883}
  client-id: ${MQTT_CLIENT_ID:greeneye-backend}

# 로컬에서만 true (IDE 환경변수 GREENEYE_DEV_USER_ENABLED=true). 배포 Docker에서는 false 유지.
greeneye:
  dev-user:
    enabled: ${GREENEYE_DEV_USER_ENABLED:false}
    oauth-id: ${GREENEYE_DEV_USER_OAUTH_ID:dev-local-greeneye}